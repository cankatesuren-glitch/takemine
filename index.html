<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TakeMine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      background: #ffffff;
      color: #111;
    }
    .container {
      max-width: 1000px;
      margin: auto;
      padding: 60px 20px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      color: #555;
    }
    .buttons {
      margin-top: 30px;
    }
    .btn {
      padding: 12px 20px;
      border-radius: 12px;
      text-decoration: none;
      margin-right: 10px;
      display: inline-block;
    }
    .primary {
      background: #111;
      color: white;
    }
    .secondary {
      border: 1px solid #ccc;
      color: #111;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Don’t buy it.<br>TakeMine it.</h1>

  <p>
    Rent everyday items from people nearby — tools, garden products,
    clothing, electronics, and more.
  </p>

  <div class="buttons">
    <a class="btn primary" href="mailto:info@takemine.de">I want to rent</a>
    <a class="btn secondary" href="mailto:info@takemine.de">List an item</a>
  </div>

  <p style="margin-top:40px;">
    📍 Starting with Germany
  </p>
</div>

</body>
</html>
